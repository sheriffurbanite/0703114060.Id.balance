<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - 0702084118</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --gold: #d4af37;
      --dark: #0a0a0a;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: var(--dark);
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* LOGIN */
    .login-container {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card {
      width: 100%;
      max-width: 380px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(15px);
      padding: 40px 30px;
      border-radius: 20px;
      border: 1px solid rgba(212,175,55,0.3);
      text-align: center;
    }
    input {
      width: 100%;
      padding: 14px;
      margin: 12px 0;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(212,175,55,0.3);
      border-radius: 12px;
      color: white;
      font-size: 16px;
    }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #d4af37, #f5e8a0);
      color: black;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    /* TOPBAR */
    .topbar {
      padding: 14px 18px;
      background: rgba(10,10,10,0.95);
      border-bottom: 1px solid rgba(212,175,55,0.2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(15px);
    }

    .avatar-box { position: relative; }
    .avatar {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(212,175,55,0.6);
      box-shadow: 0 0 0 3px rgba(212,175,55,0.15), 0 6px 18px rgba(0,0,0,0.6);
    }
    .status-dot {
      position: absolute;
      bottom: 3px;
      right: 3px;
      width: 12px;
      height: 12px;
      background: #22c55e;
      border: 2px solid #0a0a0a;
      border-radius: 50%;
    }

    .menu-icon, .bell-icon {
      font-size: 24px;
      color: var(--gold);
      cursor: pointer;
      padding: 8px;
      border-radius: 10px;
      transition: 0.3s;
    }
    .menu-icon:hover, .bell-icon:hover { background: rgba(212,175,55,0.15); }

    /* SIDEBAR */
    .sidebar {
      position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
      background: rgba(15,15,15,0.98); backdrop-filter: blur(20px);
      border-right: 1px solid rgba(212,175,55,0.25);
      transition: 0.4s ease; z-index: 300; padding: 25px 20px;
    }
    .sidebar.active { left: 0; }

    .menu-item {
      padding: 16px 20px; margin-bottom: 8px; border-radius: 14px;
      cursor: pointer; display: flex; align-items: center; gap: 12px;
    }
    .menu-item:hover { background: rgba(212,175,55,0.15); }

    .content { padding: 20px; max-width: 1200px; margin: 0 auto; }

    .card {
      background: rgba(255,255,255,0.06);
      border-radius: 24px;
      padding: 28px;
      margin-bottom: 28px;
      border: 1px solid rgba(212,175,55,0.25);
      backdrop-filter: blur(18px);
    }

    .balance-big {
      font-size: 48px;
      font-weight: 700;
      background: linear-gradient(90deg, #fff, #d4af37);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* TAB CONTROL */
    .tab-content {
      display: none;
      animation: fadeIn 0.4s ease;
    }
    .tab-content.active {
      display: block;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="loginPage" class="login-container">
    <div class="login-card">
      <h2 style="color:var(--gold); margin-bottom:30px;">Personal Portal</h2>
      <input type="tel" id="phoneInput" placeholder="Phone Number">
      <input type="password" id="passInput" placeholder="Password">
      <button onclick="login()">LOGIN</button>
      <p id="loginError" style="color:#ff6b6b; margin-top:15px; display:none;">Invalid credentials</p>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" style="display:none;">

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2 style="color:var(--gold);">Portal</h2>
        <i class="fas fa-times" onclick="toggleMenu()" style="font-size:24px; cursor:pointer;"></i>
      </div>

      <div class="menu">
        <div class="menu-item" onclick="switchTab(0)">🏠 Home</div>
        <div class="menu-item" onclick="switchTab(1)">💰 Balance</div>
        <div class="menu-item" onclick="switchTab(2)">📋 Transactions</div>
        <div class="menu-item" onclick="switchTab(3)">⚙️ Settings</div>
      </div>
    </div>

    <!-- OVERLAY -->
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <!-- TOPBAR -->
    <div class="topbar">
      <i class="fas fa-bars menu-icon" onclick="toggleMenu()"></i>

      <div style="display:flex; align-items:center; gap:12px;">
        <div class="avatar-box">
          <img src="https://picsum.photos/id/64/300/300" class="avatar">
          <span class="status-dot"></span>
        </div>
        <div>
          <div id="topPhone" style="font-weight:600;">0703114060</div>
          <div style="font-size:12px; color:#aaa;">Active Account</div>
        </div>
      </div>

      <i class="fas fa-bell bell-icon"></i>
    </div>

    <div class="content">

      <!-- HOME - Only Graph -->
      <div id="content0" class="tab-content active">
        <h1>Welcome back</h1>
        <p style="color:#aaa; margin-bottom:30px;">Today</p>
        <div class="card">
          <h2>Balance Trend</h2>
          <canvas id="balanceChart" height="160"></canvas>
        </div>
      </div>

      <!-- BALANCE -->
      <div id="content1" class="tab-content">
        <div class="card">
          <h2>Total Available</h2>
          <div class="balance-big">KSh 1,200</div>
        </div>
      </div>

      <!-- TRANSACTIONS -->
      <div id="content2" class="tab-content">
        <div class="card">
          <h2>Recent Transactions</h2>
          <p style="color:#aaa; text-align:center; padding:100px 20px;">No transactions yet.</p>
        </div>
      </div>

      <!-- SETTINGS -->
      <div id="content3" class="tab-content">
        <div class="card">
          <h2>Edit Account</h2>
          <p><strong>Phone Number</strong></p>
          <input type="tel" id="setPhone" style="width:100%; padding:14px; margin:10px 0; border-radius:12px;">
          <button onclick="saveSettings()" style="width:100%; padding:16px; background:var(--gold); color:black; border:none; border-radius:12px; font-weight:700;">Save Changes</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let chartInstance = null;

    function login() {
      const phone = document.getElementById("phoneInput").value.trim();
      const pass = document.getElementById("passInput").value.trim();

      if (phone === "0703114060" && pass === "64506350") {
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
        loadSavedSettings();
        loadChart();
      } else {
        document.getElementById("loginError").style.display = "block";
      }
    }

    function toggleMenu() {
      document.getElementById("sidebar").classList.toggle("active");
      document.getElementById("overlay").classList.toggle("active");
    }

    function switchTab(n) {
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
      document.getElementById('content' + n).classList.add('active');
      
      // Close sidebar cleanly
      document.getElementById("sidebar").classList.remove("active");
      document.getElementById("overlay").classList.remove("active");
    }

    function saveSettings() {
      const newPhone = document.getElementById("setPhone").value.trim();
      if (newPhone) {
        localStorage.setItem("savedPhone", newPhone);
        document.getElementById("topPhone").textContent = newPhone;
      }
    }

    function loadSavedSettings() {
      const saved = localStorage.getItem("savedPhone");
      if (saved) {
        document.getElementById("topPhone").textContent = saved;
        document.getElementById("setPhone").value = saved;
      } else {
        document.getElementById("setPhone").value = "0703114060";
      }
    }

    function loadChart() {
      if (chartInstance) chartInstance.destroy();
      
      chartInstance = new Chart(document.getElementById('balanceChart'), {
        type: 'line',
        data: {
          labels: ['Apr 10', 'Apr 12', 'Apr 14', 'Apr 16', 'Apr 17'],
          datasets: [{
            data: [850, 920, 1050, 1150, 1200],
            borderColor: '#d4af37',
            tension: 0.4,
            borderWidth: 3
          }]
        },
        options: { responsive: true, plugins: { legend: { display: false }}}
      });
    }

    // Enter key support
    document.addEventListener("keypress", function(e) {
      if (e.key === "Enter" && document.getElementById("loginPage").style.display !== "none") {
        login();
      }
    });
  </script>
</body>
        </html>
